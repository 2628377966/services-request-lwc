<template>

        <div class="gap-small"></div>
        <template lwc:if={showNoEftposMessage}>

                {payload.Account.Support_Phone_Number__c}.</p>

                please
                contact our support team.

                        <div style={dividerStyle}></div>
                        <div><p>Please select the relevant action you want to request.</p></div>
                        <div class="gap-small"></div>
                        <div>
                            <button class="button" onclick={selectAddUser} style={addMMUserButtonStyle}><span
                                    class="button-label">Add Merchant</span></button>
                            &nbsp;
                            <button class="button" onclick={selectRemoveUser} style={removeMMUserButtonStyle}><span
                                    class="button-label">Remove Merchant</span></button>
                        </div>
                    </div>
                </template>
            </div>
        </template>
        <div class="gap">&nbsp;</div>
