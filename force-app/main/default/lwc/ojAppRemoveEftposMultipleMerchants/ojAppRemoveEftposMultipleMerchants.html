<template>
    <template lwc:if={showForm}>
        <h1 class="title">Remove EFTPOS Multiple Merchants</h1>
        <div class="gap-16px-vr"></div>
        <p>Please provide details of the EFTPOS Merchant(s) you would like to remove from your EFTPOS payment solution.
            The merchant(s) in this list will be removed from all EFTPOS Devices you own.
        </p>
        <div class="gap-24px-vr"></div>

        <template for:each={toBeRemovedMerchants} for:item="merchant">
            <div class="validation-form" key={merchant.id}>
                <template lwc:if={merchant.addNewMerchant}>
                    <div class="new-merchant" data-id={merchant.id} onclick={enterAnotherMerchant}>Enter another
                        merchant</div>
                </template>
                <template lwc:if={merchant.expanded}>
                    <lightning-layout multiple-rows>
                        <lightning-layout-item padding="around-small" size="8">
                            <div class="label-warp">
                                <label>Trading Name</label>
                            </div>
                            <lightning-input data-id={merchant.id} variant="label-hidden" label="Trading Name"
                                value={merchant.tradingName} required onchange={handleTradingNameChange}
                                name="tradingName" type="text" pattern="^(?!\s*$).*" minlength="1"
                                message-when-pattern-mismatch="Please enter the trading name"
                                message-when-value-missing="Please complete this field to continue.">
                            </lightning-input>
                        </lightning-layout-item>
                        <lightning-layout-item padding="around-small" size="8">
                            <div class="label-warp">
                                <label>Email Address</label>
                            </div>
                            <lightning-input data-id={merchant.id} variant="label-hidden" label="Email Address"
                                name="email" type="text" value={merchant.email} onchange={handleEmailChange}
                                class="inputStyle" minlength="5" required
                                message-when-value-missing="Please enter a valid email."
                                message-when-pattern-mismatch="Please enter a valid email."></lightning-input>
                        </lightning-layout-item>
                        <lightning-layout-item padding="around-small" size="6">
                            <div class="label-warp">
                                <label>Payments ID of Merchant</label>
                            </div>
                            <lightning-input data-id={merchant.id} variant="label-hidden"
                                label="Payments ID of Merchant" value={merchant.clientId}
                                onchange={handlePaymentsIdChange} name="clientId" type="text"
                                pattern="\d{3}-\d{3}-\d{3}" minlength="1"
                                message-when-pattern-mismatch="Please enter in the format: XXX-XXX-XXX" required
                                message-when-value-missing="Please complete this field to continue.">
                            </lightning-input>
                        </lightning-layout-item>
                    </lightning-layout>
                    <div class="gap-48px-vr"></div>
                    <div style="display: flex; justify-content: flex-end;">
                        <template lwc:if={merchant.showCancel}>
                            <p class="cancel-button" data-id={merchant.id} onclick={handleCancelButton}>Cancel</p>
                            <div class="gap-24px-hr"></div>
                        </template>
                        <button class="save-button" data-id={merchant.id} name={merchant.id} onclick={handleSaveButton}
                            disabled={merchant.disableSaveButton}>
                            Save
                        </button>
                    </div>
                </template>
                <template lwc:if={merchant.showSummary}>
                    <div style="display: flex;">
                        <span>
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none">
                                <path
                                    d="M11.9999 10.1053C13.0001 10.1053 13.9778 9.80893 14.8095 9.25374C15.6411 8.69855 16.2893 7.90944 16.6721 6.98619C17.0548 6.06295 17.155 5.04703 16.9598 4.06691C16.7647 3.0868 16.2831 2.18651 15.5758 1.47988C14.8686 0.773261 13.9675 0.292044 12.9865 0.0970867C12.0055 -0.0978702 10.9887 0.00219064 10.0646 0.384612C9.14054 0.767034 8.35073 1.41464 7.79504 2.24554C7.23936 3.07644 6.94276 4.05331 6.94276 5.05263C6.94276 6.39267 7.47555 7.67783 8.42394 8.62538C9.37234 9.57294 10.6587 10.1053 11.9999 10.1053ZM11.9999 1.51579C12.7 1.51579 13.3845 1.72322 13.9666 2.11186C14.5488 2.50049 15.0025 3.05286 15.2704 3.69914C15.5383 4.34541 15.6085 5.05655 15.4719 5.74263C15.3353 6.42871 14.9981 7.05892 14.503 7.55356C14.008 8.04819 13.3772 8.38504 12.6905 8.52151C12.0038 8.65798 11.292 8.58794 10.6452 8.32025C9.99833 8.05255 9.44547 7.59923 9.05649 7.0176C8.66751 6.43596 8.4599 5.75215 8.4599 5.05263C8.4599 4.1146 8.83286 3.215 9.49673 2.55171C10.1606 1.88842 11.061 1.51579 11.9999 1.51579ZM14.0228 11.3684H9.97705C8.1672 11.3711 6.43224 12.0906 5.15248 13.3692C3.87272 14.6478 3.15258 16.3812 3.1499 18.1895V21.2211C3.1499 21.9581 3.44294 22.6649 3.96456 23.1861C4.48618 23.7072 5.19365 24 5.93133 24H18.0685C18.8062 24 19.5136 23.7072 20.0352 23.1861C20.5568 22.6649 20.8499 21.9581 20.8499 21.2211V18.1895C20.8472 16.3812 20.1271 14.6478 18.8473 13.3692C17.5676 12.0906 15.8326 11.3711 14.0228 11.3684ZM19.3328 21.2211C19.3328 21.5561 19.1996 21.8774 18.9625 22.1142C18.7254 22.3511 18.4038 22.4842 18.0685 22.4842H5.93133C5.59602 22.4842 5.27442 22.3511 5.03732 22.1142C4.80022 21.8774 4.66705 21.5561 4.66705 21.2211V18.1895C4.66972 16.7833 5.23 15.4354 6.22524 14.441C7.22048 13.4467 8.56957 12.8869 9.97705 12.8842H14.0228C15.4302 12.8869 16.7793 13.4467 17.7745 14.441C18.7698 15.4354 19.3301 16.7833 19.3328 18.1895V21.2211Z"
                                    fill={primaryColour} />
                            </svg>
                        </span>
                        <span class="gap-13px-hr"></span>
                        <span class="business-name">{merchant.tradingName}</span>
                        <span style="flex-grow: 2;"></span>
                        <div style="cursor: pointer" data-id={merchant.id} onclick={editMerchant}>
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none">
                                <g clip-path="url(#clip0_2527_1316)">
                                    <path
                                        d="M20.8789 2.58533L21.4147 3.1211C21.9681 3.67458 21.9681 4.57343 21.4147 5.12691L20.2324 6.30914L17.6909 3.76756L18.8731 2.58533C19.4266 2.03186 20.3254 2.03186 20.8789 2.58533ZM9.11859 12.3398L16.6902 4.76825L19.2317 7.30982L11.6602 14.8814C11.4742 15.0674 11.2351 15.2002 10.9783 15.2622L8.07362 15.9308L8.74223 13.0217C8.79979 12.7649 8.93262 12.5258 9.12302 12.3398H9.11859ZM17.8724 1.58022L8.1179 11.3391C7.74154 11.7155 7.4803 12.1893 7.36074 12.7073L6.43533 16.719C6.38219 16.9581 6.45304 17.206 6.62573 17.3787C6.79841 17.5514 7.04637 17.6222 7.28547 17.5691L11.2971 16.6437C11.8151 16.5241 12.2889 16.2629 12.6653 15.8865L22.4198 6.1276C23.5267 5.02064 23.5267 3.22737 22.4198 2.12041L21.884 1.58022C20.7771 0.473261 18.9838 0.473261 17.8768 1.58022H17.8724ZM4.29226 3.41334C2.33516 3.41334 0.75 4.9985 0.75 6.9556V19.7077C0.75 21.6648 2.33516 23.25 4.29226 23.25H17.0444C19.0015 23.25 20.5867 21.6648 20.5867 19.7077V14.0401C20.5867 13.6505 20.2679 13.3317 19.8782 13.3317C19.4886 13.3317 19.1698 13.6505 19.1698 14.0401V19.7077C19.1698 20.8811 18.2178 21.8331 17.0444 21.8331H4.29226C3.11889 21.8331 2.1669 20.8811 2.1669 19.7077V6.9556C2.1669 5.78222 3.11889 4.83024 4.29226 4.83024H9.95988C10.3495 4.83024 10.6683 4.51144 10.6683 4.12179C10.6683 3.73214 10.3495 3.41334 9.95988 3.41334H4.29226Z"
                                        fill={primaryColour} />
                                </g>
                                <defs>
                                    <clipPath id="clip0_2527_1316">
                                        <rect width="24" height="24" fill="white" />
                                    </clipPath>
                                </defs>
                            </svg>
                        </div>
                        <span class="gap-24px-hr"></span>
                        <div style="cursor: pointer" data-id={merchant.id} onclick={deleteMerchant}>
                            <template lwc:if={merchant.showCancel}>
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none">
                                    <path
                                        d="M18.8427 20.0099C19.1629 20.33 19.6897 20.33 20.0099 20.0099C20.33 19.6897 20.33 19.1629 20.0099 18.8427L13.1671 12L20.0099 5.15728C20.33 4.83709 20.33 4.31033 20.0099 3.99014C19.6897 3.66995 19.1629 3.66995 18.8427 3.99014L12 10.8329L5.15728 3.99014C4.83709 3.66995 4.31033 3.66995 3.99014 3.99014C3.66995 4.31033 3.66995 4.83709 3.99014 5.15728L10.8329 12L3.99014 18.8427C3.66995 19.1629 3.66995 19.6897 3.99014 20.0099C4.31033 20.33 4.83709 20.33 5.15728 20.0099L12 13.1671L18.8427 20.0099Z"
                                        fill={primaryColour} />
                                </svg>
                            </template>
                        </div>
                    </div>
                    <div class="gap-15px-vr"></div>
                    <div class="divider"></div>
                    <div class="gap-24px-vr"></div>
                    <table>
                        <tr>
                            <td style="width: 30%;"><span class="small-title">Email:</span></td>
                            <td><span class="small-value">{merchant.email}</span></td>
                        </tr>
                        <tr>
                            <td style="width: 30%;"><span class="small-title">Payments Id:</span></td>
                            <td><span class="small-value">{merchant.clientId}</span></td>
                        </tr>
                    </table>
                </template>
            </div>
        </template>
    </template>
</template>
